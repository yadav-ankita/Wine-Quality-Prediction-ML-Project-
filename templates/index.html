<!DOCTYPE html>
<html>
<head>
    <title>Wine Quality Predictor</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
            text-align: center;
            padding: 20px;
        }

        form {
            background: white;
            padding: 20px;
            border-radius: 10px;
            display: inline-block;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        input {
            margin: 8px;
            padding: 10px;
            width: 250px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            padding: 10px 20px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #218838;
        }

        h2 {
            color: #333;
        }
    </style>
</head>

<body>

    <h2>🍷 Wine Quality Prediction</h2>

    <form action="/predict" method="post">

        <input type="number" step="any" name="fixed_acidity" placeholder="Fixed Acidity (4.0 - 16.0)" required><br>

<input type="number" step="any" name="volatile_acidity" placeholder="Volatile Acidity (0.1 - 1.6)" required><br>

<input type="number" step="any" name="citric_acid" placeholder="Citric Acid (0.0 -1.0)" required><br>

<input type="number" step="any" name="residual_sugar" placeholder="Residual Sugar (0.9 -15.5)" required><br>

<input type="number" step="any" name="chlorides" placeholder="Chlorides (0.01 -0.6)" required><br>

<input type="number" step="any" name="free_sulfur_dioxide" placeholder="Free SO2 (1 - 70)" required><br>

<input type="number" step="any" name="total_sulfur_dioxide" placeholder="Total SO2 (6 - 290)" required><br>

<input type="number" step="any" name="density" placeholder="Density (0.990 -1.004)" required><br>

<input type="number" step="any" name="pH" placeholder="pH (2.8 -4.0)" required><br>

<input type="number" step="any" name="sulphates" placeholder="Sulphates (0.3 - 2.0)" required><br>

<input type="number" step="any" name="alcohol" placeholder="Alcohol (8.0 - 14.9)" required><br>
        <br>
        <button type="submit">Predict</button>
    </form>

    <h3>Quality:{{ prediction_text }}</h3>

</body>
</html>
